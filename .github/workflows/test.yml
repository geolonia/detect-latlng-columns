name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # dist のコミット漏れを検知（ビルド成果物がリポジトリと一致するか）
      - name: Verify dist is up to date
        run: git diff --exit-code -- dist
